name: Matts-Custom-ban-Editer
main: com.matt.banediter.BanEditerPlugin
version: 1.0
api-version: 1.20

commands:
  editban:
    description: Edit a player's ban message
    usage: /editban <player> <prefix> <reason>
    permission: banediter.edit

permissions:
  banediter.edit:
    description: Allows editing ban messages
    default: op
